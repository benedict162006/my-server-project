<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Web vs File Server Project</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #f4f7f6; 
            padding: 40px; 
        }
        .box { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: inline-block; 
        }
        img { 
            width: 320px; 
            border-radius: 8px; 
            border: 2px solid #2ecc71; 
            margin-top: 15px; 
            display: none; /* hidden at first */
        }
        .label { 
            font-weight: bold; 
            color: #2c3e50; 
        }
        button {
            background-color: #d8b4fe; /* light violet */
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #c084fc;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>[BENEDICT IBO]</h1>
        <h3>Section: [BSIT III-F2]</h3>
        <p class="label">Website hosted by: GitHub (Web Server)</p>
        <p class="label">Image hosted by: Google Drive (File Server)</p>
        <hr>

        <!-- Enter Button -->
        <button onclick="showImage()">Enter</button>

        <!-- Image -->
        <img id="serverImage" src="https://lh3.googleusercontent.com/d/1gGhIdLs44udyxBEm3r2iyq_CXAozamyq" alt="Server Image">
    </div>

    <script>
        function showImage() {
            document.getElementById("serverImage").style.display = "block";
        }
    </script>
</body>
</html>
