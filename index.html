<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Web vs File Server Project</title>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 40px; 
            color: #2c3e50;

            /* 🌈 Animated Gradient Background */
            background: linear-gradient(-45deg, #f3e8ff, #e0c3fc, #d8b4fe, #c084fc);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .box { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            display: inline-block; 
        }

        img { 
            width: 320px; 
            border-radius: 10px; 
            border: 2px solid #c084fc; 
            margin-top: 15px; 
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .label { 
            font-weight: bold; 
        }

        /* 💧 Liquid Button */
        button {
            position: relative;
            background: #d8b4fe;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            overflow: hidden;
            transition: 0.3s;
            color: #2c3e50;
        }

        button:hover {
            background: #c084fc;
            transform: scale(1.05);
        }

        /* Ripple effect */
        button::after {
            content: "";
            position: absolute;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
            opacity: 0;
        }

        button:active::after {
            width: 200px;
            height: 200px;
            opacity: 1;
            transition: 0.4s;
        }

    </style>
</head>

<body>

    <div class="box">
        <h1>BENEDICT IBO</h1>
        <h3>Section: BSIT III-F2</h3>

        <p class="label">Website hosted by: GitHub (Web Server)</p>
        <p class="label">Image hosted by: Google Drive (File Server)</p>
        <hr>

        <button onclick="showImage()">Enter</button>

        <!-- ✅ Working Google Drive Image -->
        <img id="serverImage" 
        src=" https://drive.google.com/file/d/1gGhIdLs44udyxBEm3r2iyq_CXAozamyq/view?usp=drive_link" 
        alt="Server Image">
       

    </div>

    <script>
        function showImage() {
            let img = document.getElementById("serverImage");
            img.style.display = "block";

            setTimeout(() => {
                img.style.opacity = "1";
            }, 50);
        }
    </script>

</body>
</html>
