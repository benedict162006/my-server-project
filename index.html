<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web vs File Server Project</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f4f7f6; 
            padding: 40px; 
            margin: 0;
        }
        .box { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: inline-block;
            max-width: 400px;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; text-transform: uppercase; }
        h3 { color: #7f8c8d; margin-top: 0; font-weight: normal; }
        
        .label { 
            font-weight: bold; 
            color: #34495e; 
            font-size: 14px;
            margin: 10px 0;
        }

        /* Itatago ang image sa simula */
        #google-drive-image { 
            display: none; 
            width: 100%; 
            max-width: 320px;
            border-radius: 10px; 
            border: 3px solid #2ecc71; 
            margin-top: 20px; 
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Style para sa Enter Button */
        .enter-btn {
            background-color: #2ecc71;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .enter-btn:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="box">
        <h1>BENEDICT IBO</h1>
        <h3>Section: BSIT III-F2</h3>
        
        <p class="label">🌐 Web Server: GitHub Pages</p>
        <p class="label">📂 File Server: Google Drive</p>
        
        <hr>

        <button class="enter-btn" id="show-image-btn">ENTER TO VIEW IMAGE</button>

<img id="google-drive-image" 
     src="https://drive.google.com/uc?export=view&id=1gGhIdLs44udyxBEm3r2iyq_CXAozamyq" 
     alt="Server Image">
    </div>

    <script>
        document.getElementById('show-image-btn').addEventListener('click', function() {
            // Lalabas ang image
            const img = document.getElementById('google-drive-image');
            img.style.display = 'inline-block';
            
            // Mawawala ang button para malinis tingnan ang output
            this.style.display = 'none';
        });
    </script>

</body>
</html>
